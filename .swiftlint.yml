disabled_rules:
  - static_over_final_class
  - trailing_comma
  - opening_brace

included:
  - TypeFree
  - TypeFreeTests
  - TypeFreeUITests

excluded:
  - .git
  - .build
  - DerivedData
  - .agents
  - .codex
  - .specify
  - TypeFree.xcodeproj

opt_in_rules:
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_count
  - explicit_init
  - first_where
  - joined_default_parameter
  - last_where
  - modifier_order
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - sorted_imports
  - toggle_bool
  - vertical_whitespace_closing_braces

file_length:
  warning: 300
  error: 400

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

reporter: "xcode"
